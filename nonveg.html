<!DOCTYPE html>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* navbar */

.navbar{
background:#e1a91c;
padding:12px 30px;
}

.logo{
color:black;
text-decoration:none;
}

/* section */

.section{
padding:40px;
}

/* cards */

.card{
background:white;
padding:20px;
margin:15px;

text-align:center;

.media{

gap:30px;
justify-content:center;
margin-bottom:30px;
flex-wrap:wrap;

.media img{
width:420px;
height:260px;
object-fit:cover;
border-radius:12px;

.media iframe{

height:260px;
border:none;
border-radius:12px;

.recipe-info{

font-size:14px;
}

.buttons button:first-child{

function getRecipeData(button){

let recipe = button.closest(".recipe");

let name = recipe.querySelector("h1").innerText;
let image = recipe.querySelector("img").src;

let ingredients = "";
recipe.querySelectorAll(".ingredients li").forEach(li=>{
ingredients += li.innerText + "\n";
});

let steps = "";
recipe.querySelectorAll(".steps li").forEach(li=>{
steps += li.innerText + "\n";
});

return { name, image, ingredients, steps };

}


function saveRecipe(button){

let currentRecipe = getRecipeData(button);

let saved = JSON.parse(localStorage.getItem("recipes")) || [];
saved.push(currentRecipe);

localStorage.setItem("recipes", JSON.stringify(saved));

alert("Recipe saved!");
window.location.href = "saved.html";

}


function addToFavourites(button){

let currentRecipe = getRecipeData(button);

let favs = JSON.parse(localStorage.getItem("favourites")) || [];
favs.push(currentRecipe);

localStorage.setItem("favourites", JSON.stringify(favs));

alert("Added to favourites!");
window.location.href = "favourites.html";

}
