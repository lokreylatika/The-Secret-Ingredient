<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Finder - Sign Up</title>
  <style>
 body{
  background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') no-repeat center center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
 }
.signup-container {
  background: rgba(255, 255, 255, 0.9);
  padding: 2rem;
  border-radius: 10px;
  width: 400px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
.signup-container h1 {
  margin-bottom: 1.5rem;
  color: #fbc02d; 
}
.signup-form {
  display: flex;
  flex-direction: column;
}
.signup-form label {
  text-align: left;
  margin-bottom: 0.3rem;
  font-weight: bold;
  color: #333;
}
.signup-form input {
  padding: 0.7rem;
  margin-bottom: 1rem;
  border: 1px solid #ccc;
  border-radius: 5px;
}
.signup-form button {
  padding: 0.8rem;
  background:#fbc02d;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 1rem;
}
.signup-form button:hover {
  background: #dda820;
}
.login-text {
  margin-top: 1rem;
  font-size: 0.9rem;
}
.login-text a {
  color: #fbc02d;
  text-decoration: none;
}
.login-text a:hover {
  text-decoration: underline;
}
  </style>
</head>
<body>
  <div class="signup-container">
    <h1>SIGN UP</h1>
    <form class="signup-form" action="Homepage.html">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Enter your name" required>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Create a password" required>

      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Re-enter your password" required>

      <button type="submit">Sign Up</button>
      <p class="login-text">Already have an account? <a href="Login.html">Login</a></p>
    </form>
  </div>
  <script>
  document.querySelector(".signup-form").addEventListener("submit", function(e) {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm-password").value;

    if (password !== confirmPassword) {
      e.preventDefault(); // stop form submission
      alert("Passwords do not match! Please re-enter.");
    }
  });
</script>

</body>
</html>
