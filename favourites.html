<!DOCTYPE html>
<html>
<head>
  <title>❤️ Favourite Recipes</title>
  <style>
   body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #fff7e6, #ffe0b2);
  margin: 0;
  padding: 100px 20px 40px; 
  text-align: center;
  color: #333;
}
    h1 {
      font-size: 32px;
      margin-bottom: 5px;
    }

    p {
      font-size: 16px;
      color: #666;
      margin-bottom: 20px;
    }
    #favourites-list {
      display: flex;
      flex-direction: center;
      align-items: left;
      gap: 15px;
    }
    .recipe-card {
      background: #fff;
      width: 90%;
      max-width: 400px;
      text-align: left;
      padding: 20px;
      margin: 15px 0;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .recipe-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.2);
    }

    .recipe-card img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .recipe-card h3 {
      margin-bottom: 10px;
      color: #222;
    }

    .recipe-card p {
      margin-bottom: 10px;
      line-height: 1.5;
      color: #555;
    }

    .recipe-card strong {
      color: #222;
    }
    .recipe-card button {
      padding: 8px 14px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff4081, #f48fb1);
      color: white;
      transition: all 0.3s ease;
    }

    .recipe-card button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    #favourites-list p {
      font-size: 16px;
      color: #777;
      margin-top: 30px;
    }
    .navbar{
background:#e1a91c;
padding:12px 30px;
 top: 0;        
 position: fixed;   
  left: 0;           
  width: 100%;       
  z-index: 1000;     
  text-align: left;
}
a{
  color: black;
  text-decoration: none;
}
  </style>
</head>
<body>
  <div class="navbar">
<a href="Homepage.html" class="logo"><h2>The Secret Ingredient</h2></a>
</div>
  <h1>❤️ Favourite Recipes</h1>
  <p>Your favourite recipes are stored here.</p>

  <div id="favourites-list">
    <p>No favourites added yet.</p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", loadFavourites);

    function loadFavourites() {
      const container = document.getElementById("favourites-list");
      container.innerHTML = "";

      const favourites = JSON.parse(localStorage.getItem("favourites")) || [];

      if (favourites.length === 0) {
        container.innerHTML = "<p>No favourites added yet.</p>";
        return;
      }

      favourites.forEach((recipe, index) => {
        const card = document.createElement("div");
        card.className = "recipe-card";

        card.innerHTML = `
          ${recipe.image ? `<img src="${recipe.image}" alt="${recipe.name}">` : ""}
          <h3>${recipe.name}</h3>
          <p><strong>Ingredients:</strong><br>${recipe.ingredients.replace(/\n/g, "<br>")}</p>
          <p><strong>Steps:</strong><br>${recipe.steps.replace(/\n/g, "<br>")}</p>
          <button onclick="removeFavourite(${index})">Remove</button>
        `;

        container.appendChild(card);
      });
    }

    function removeFavourite(index) {
      let favourites = JSON.parse(localStorage.getItem("favourites")) || [];
      favourites.splice(index, 1);
      localStorage.setItem("favourites", JSON.stringify(favourites));
      loadFavourites();
    }
  </script>
</body>
</html>
