<!DOCTYPE html>
<html>
<head>
  <title>💾 Saved Recipes</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #fff7e6, #ffe0b2);
      margin: 0;
      padding: 40px 20px;
      text-align: center;
      color: #333;
    }
    h1 {
      margin-top: 80px;
      font-size: 32px;
      margin-bottom: 5px;
    }

    p {
      font-size: 16px;
      color: #666;
      margin-bottom: 20px;
    }

    #saved-list {
   margin-top: 80px;
      display: flex;
      flex-direction: center;
      align-items: left;
      gap: 15px;
    }

    /* Recipe Card */
    .recipe-card {
      background: #fff;
      width: 90%;
      max-width: 400px;
      text-align: left;
      padding: 20px;
      margin: 15px 0;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .recipe-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.2);
    }

    /* Recipe Card Image */
    .recipe-card img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    /* Recipe Card Text */
    .recipe-card h3 {
      margin-bottom: 10px;
      color: #222;
    }

    .recipe-card p {
      margin-bottom: 10px;
      line-height: 1.5;
      color: #555;
    }

    .recipe-card strong {
      color: #222;
    }

    /* Delete Button */
    .recipe-card button {
      padding: 8px 14px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(135deg, #f44336, #e57373);
      color: white;
      transition: all 0.3s ease;
    }

    .recipe-card button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* Optional: Message styling */
    #saved-list p {
      font-size: 16px;
      color: #777;
      margin-top: 30px;
    }
    .navbar{
background:#e1a91c;
padding:12px 30px;
 top: 0;        
 position: fixed;   
  left: 0;           
  width: 100%;       
  z-index: 1000;  
text-align: left;   
}
a{
  color: black;
  text-decoration: none;
}
  </style>
</head>
<body>
  <div class="navbar">
<a href="Homepage.html" class="logo"><h2>The Secret Ingredient</h2></a>
</div>
  <h1>💾 Saved Recipes</h1>
  <p>Your saved recipes will appear here.</p>

  <div id="saved-list">
    <p>No saved recipes yet.</p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", loadSavedRecipes);

    function loadSavedRecipes() {
      const container = document.getElementById("saved-list");
      container.innerHTML = "";

      const recipes = JSON.parse(localStorage.getItem("recipes")) || [];

      if (recipes.length === 0) {
        container.innerHTML = "<p>No saved recipes yet.</p>";
        return;
      }

      recipes.forEach((recipe, index) => {
        const card = document.createElement("div");
        card.className = "recipe-card";

        card.innerHTML = `
          ${recipe.image ? `<img src="${recipe.image}" alt="${recipe.name}">` : ""}
          <h3>${recipe.name}</h3>
          <p><strong>Ingredients:</strong><br>${recipe.ingredients.replace(/\n/g, "<br>")}</p>
          <p><strong>Steps:</strong><br>${recipe.steps.replace(/\n/g, "<br>")}</p>
          <button onclick="deleteSaved(${index})">Delete</button>
        `;

        container.appendChild(card);
      });
    }

    function deleteSaved(index) {
      let recipes = JSON.parse(localStorage.getItem("recipes")) || [];
      recipes.splice(index, 1);
      localStorage.setItem("recipes", JSON.stringify(recipes));
      loadSavedRecipes();
    }
  </script>
</body>
</html>
