<!DOCTYPE html>
<html>
<head>
  <title>Add Recipe</title>
  <style>
   body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #fff7e6, #ffe0b2);
  margin: 0;
  padding: 100px 20px 40px; /* TOP padding added */
  text-align: center;
  color: #333;
}

    h1, h2, p {
      color: #333;
    }

    input, textarea {
      width: 80%;
      padding: 8px;
      margin: 5px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      padding: 10px 18px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #4caf50, #81c784);
      color: white;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }

    .recipe-card {
      background: #fff;
      padding: 15px;
      margin: 15px auto;
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
    }

    .recipe-card img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .navbar{
background:#e1a91c;
padding:12px 30px;
 top: 0;        
 position: fixed;   
  left: 0;           
  width: 100%;       
  z-index: 1000;    
  text-align: left; 
}
a{
  color: black;
  text-decoration: none;
}
  </style>
</head>
<body>
  <div class="navbar">
<a href="Homepage.html" class="logo"><h2>The Secret Ingredient</h2></a>
</div>
  <h1>➕ Add Recipe</h1>
  <p>Share your own recipe with ingredients, steps, and an image.</p>

  <form id="add-recipe-form">
    <label>Recipe Name:</label><br>
    <input id="recipe-name" type="text" required><br><br>

    <label>Ingredients:</label><br>
    <textarea id="recipe-ingredients" required></textarea><br><br>

    <label>Steps:</label><br>
    <textarea id="recipe-steps" required></textarea><br><br>

    <label>Upload Image:</label><br>
    <input id="recipe-image" type="file" accept="image/*"><br><br>

    <button type="submit">Save Recipe</button>
  </form>

  <hr>
  <script>
    document.addEventListener("DOMContentLoaded", loadRecipes);

    document.getElementById("add-recipe-form").addEventListener("submit", function(e) {
      e.preventDefault();

      const name = document.getElementById("recipe-name").value;
      const ingredients = document.getElementById("recipe-ingredients").value;
      const steps = document.getElementById("recipe-steps").value;
      const imageInput = document.getElementById("recipe-image");

      if (imageInput.files.length > 0) {
        const reader = new FileReader();
        reader.onload = function() {
          const imageData = reader.result;

          saveRecipe({name, ingredients, steps, image: imageData});
        }
        reader.readAsDataURL(imageInput.files[0]);
      } else {
        saveRecipe({name, ingredients, steps, image: null});
      }

      this.reset();
    });

    function saveRecipe(recipe) {
      let recipes = JSON.parse(localStorage.getItem("recipes")) || [];
      recipes.push(recipe);
      localStorage.setItem("recipes", JSON.stringify(recipes));
      loadRecipes();
    }

    function loadRecipes() {
      const container = document.getElementById("saved-recipes");
      container.innerHTML = "";

      const recipes = JSON.parse(localStorage.getItem("recipes")) || [];

      if (recipes.length === 0) {
        container.innerHTML = "<p>No recipes saved yet.</p>";
        return;
      }

      recipes.forEach((recipe, index) => {
        const card = document.createElement("div");
        card.className = "recipe-card";

        card.innerHTML = `
          ${recipe.image ? `<img src="${recipe.image}" alt="${recipe.name}">` : ""}
          <h3>${recipe.name}</h3>
          <p><strong>Ingredients:</strong><br>${recipe.ingredients.replace(/\n/g, "<br>")}</p>
          <p><strong>Steps:</strong><br>${recipe.steps.replace(/\n/g, "<br>")}</p>
          <button onclick="deleteRecipe(${index})">Delete</button>
        `;
        container.appendChild(card);
      });
    }

    function deleteRecipe(index) {
      let recipes = JSON.parse(localStorage.getItem("recipes")) || [];
      recipes.splice(index, 1);
      localStorage.setItem("recipes", JSON.stringify(recipes));
      loadRecipes();
    }
  </script>
</body>
</html>
