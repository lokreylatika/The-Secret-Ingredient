<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Finder - Login</title>
  <style>
body {
  font-family: Arial, sans-serif;
  background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') no-repeat center center/cover;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
.login-container {
  background: rgba(255, 255, 255, 0.9);
  padding: 2rem;
  border-radius: 10px;
  width: 350px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
.login-container h1 {
  margin-bottom: 1.5rem;
  color: #fbc02d;
}
.login-form {
  display: flex;
  flex-direction: column;
}
.login-form label {
  text-align: left;
  margin-bottom: 0.3rem;
  font-weight: bold;
  color: #333;
}
.login-form input {
  padding: 0.7rem;
  margin-bottom: 1rem;
  border: 1px solid #ccc;
  border-radius: 5px;
}
.login-form button {
  padding: 0.8rem;
  background: #fbc02d;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 1rem;
}
.login-form button:hover {
  background: #dda820;
}
.signup-text {
  margin-top: 1rem;
  font-size: 0.9rem;
}
.signup-text a {
  color: #fbc02d;
  text-decoration: none;
  font-weight: bold;
}
.signup-text a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
  <div class="login-container">
    <h1>LOGIN</h1>
    <form class="login-form" id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>

      <button type="submit">Login</button>
      <p class="signup-text">Don't have an account? <a href="Signup.html">Sign up</a></p>
    </form>
    <script>
    const form = document.getElementById("loginForm");
    form.addEventListener("submit", function(event) {
      event.preventDefault();
      window.location.href = "Homepage.html"; 
    });
  </script>

</body>
</html>
